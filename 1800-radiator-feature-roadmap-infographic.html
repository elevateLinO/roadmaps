<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>1-800-Radiator — Feature roadmap</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sansation:wght@700&family=Titillium+Web:ital,wght@0,300;0,400;0,600;0,700;1,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --elevate-navy: #192036;
      --elevate-white: #ffffff;
      --binary-blue: #0f75bd;
      --electric-blue: #00aeef;
      --gamma-green: #00fe7c;
      --violet-vortex: #723aca;
      --orbital-orange: #ff9600;
      --solar-yellow: #ffea37;
      --bg: #192036;
      --panel: #1e2a45;
      --panel2: rgba(255, 255, 255, 0.06);
      --text: #ffffff;
      --muted: rgba(255, 255, 255, 0.6);
      --line: rgba(255, 255, 255, 0.1);
      --accent: #00aeef;
      --p1: #00aeef;
      --p2: #723aca;
      --p3: #00fe7c;
      --card: rgba(17, 24, 39, 0.55);
      --font-display: "Sansation", Georgia, serif;
      --font: "Titillium Web", system-ui, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: var(--font);
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.45;
      position: relative;
      isolation: isolate;
    }
    body::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 340px;
      z-index: 0;
      pointer-events: none;
      background:
        radial-gradient(ellipse 110% 85% at 50% -35%, rgba(0, 174, 239, 0.38), transparent 58%),
        radial-gradient(ellipse 75% 55% at 92% 8%, rgba(0, 254, 124, 0.14), transparent 52%),
        radial-gradient(ellipse 65% 50% at 8% 18%, rgba(120, 185, 255, 0.11), transparent 48%),
        linear-gradient(180deg, rgba(8, 22, 48, 0.55) 0%, rgba(25, 32, 54, 0) 100%);
    }
    body::after {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 320px;
      z-index: 0;
      pointer-events: none;
      background: url("black-lines-1.png") center top / cover no-repeat;
      opacity: 0.16;
      mix-blend-mode: screen;
      mask-image: linear-gradient(180deg, #000 0%, #000 55%, transparent 100%);
      -webkit-mask-image: linear-gradient(180deg, #000 0%, #000 55%, transparent 100%);
    }
    .page {
      position: relative;
      z-index: 1;
      background: transparent;
      min-height: 100vh;
    }
    .wrap {
      max-width: 1280px;
      margin: 0 auto;
      padding: 2rem 1.25rem 4rem;
    }
    header {
      display: flex;
      align-items: flex-start;
      gap: 1.25rem;
      margin-bottom: 2rem;
      border-bottom: 1px solid var(--line);
      padding-bottom: 1.25rem;
    }
    .brand-logo {
      flex-shrink: 0;
      height: clamp(48px, 9vw, 68px);
      width: auto;
      object-fit: contain;
    }
    .header-text {
      min-width: 0;
    }
    h1 {
      font-family: var(--font-display);
      font-size: clamp(1.35rem, 3vw, 1.85rem);
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin: 0 0 0.35rem;
    }
    .subtitle {
      color: var(--muted);
      font-size: 0.95rem;
      max-width: 52ch;
      margin: 0;
    }
    .timeline-top {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.5rem;
      margin-bottom: 0.25rem;
      position: relative;
    }
    .timeline-top::after {
      content: "";
      position: absolute;
      left: 8%;
      right: 8%;
      top: 50%;
      height: 3px;
      background: linear-gradient(90deg, var(--p1), var(--p2), var(--p3));
      border-radius: 2px;
      z-index: 0;
      opacity: 0.95;
      box-shadow: 0 0 12px rgba(0, 174, 239, 0.25);
    }
    .phase-pill {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 0.65rem 0.5rem;
    }
    .phase-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      margin: 0 auto 0.5rem;
      border: 3px solid var(--bg);
      box-shadow: 0 0 0 2px currentColor;
    }
    .phase-pill.p1 { color: var(--p1); }
    .phase-pill.p2 { color: var(--p2); }
    .phase-pill.p3 { color: var(--p3); }
    .phase-pill strong {
      display: block;
      font-size: 0.95rem;
      color: var(--text);
    }
    .phase-pill span.hint {
      font-size: 0.72rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .swimlane {
      display: grid;
      grid-template-columns: minmax(200px, 240px) 1fr;
      gap: 1rem;
      align-items: stretch;
      margin-bottom: 1.25rem;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--line);
      background: var(--panel);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }
    .lane-label {
      padding: 1rem 1rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 0.35rem;
      border-right: 1px solid var(--line);
    }
    .lane-id {
      font-family: ui-monospace, monospace;
      font-size: 0.8rem;
      color: var(--accent);
      font-weight: 600;
    }
    .lane-title {
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1.35;
    }
    .phase-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0;
      min-height: 100%;
    }
    .phase-col {
      padding: 0.65rem;
      border-left: 1px solid var(--line);
      background: rgba(0,0,0,0.12);
    }
    .phase-col:first-child { border-left: none; }
    .phase-col.c1 { box-shadow: inset 0 0 0 1px rgba(0, 174, 239, 0.12); }
    .phase-col.c2 { box-shadow: inset 0 0 0 1px rgba(114, 58, 202, 0.12); }
    .phase-col.c3 { box-shadow: inset 0 0 0 1px rgba(0, 254, 124, 0.1); }
    .feat {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 0.5rem 0.6rem;
      margin-bottom: 0.45rem;
      font-size: 0.78rem;
    }
    .feat:last-child { margin-bottom: 0; }
    .feat-id {
      font-family: ui-monospace, monospace;
      font-size: 0.68rem;
      color: var(--muted);
      margin-bottom: 0.2rem;
    }
    .feat-title {
      color: var(--text);
      font-weight: 500;
    }
    .feat-deps {
      margin-top: 0.35rem;
      font-size: 0.65rem;
      color: var(--muted);
      border-top: 1px dashed var(--line);
      padding-top: 0.3rem;
    }
    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.25rem;
      margin-top: 0.35rem;
    }
    .tag {
      font-size: 0.58rem;
      padding: 0.12rem 0.35rem;
      border-radius: 3px;
      background: var(--panel2);
      color: rgba(255, 255, 255, 0.85);
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    .tag.CA { background: rgba(255, 150, 0, 0.22); color: #ffd199; }
    .tag.CX { background: rgba(0, 174, 239, 0.2); color: #7fe0fb; }
    .tag.Ops { background: rgba(114, 58, 202, 0.22); color: #c9b5f5; }
    .tag.Fin { background: rgba(15, 117, 189, 0.25); color: #93c9eb; }
    .tag.Tech { background: rgba(255, 234, 55, 0.18); color: #fff3a3; }
    .tag.Mkt { background: rgba(255, 150, 0, 0.18); color: #ffd699; }
    .tag.Search { background: rgba(0, 254, 124, 0.14); color: #9cffc4; }
    .legend {
      margin-top: 2.5rem;
      padding: 1.25rem;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: var(--panel);
    }
    .legend h2 {
      font-family: var(--font-display);
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--electric-blue);
      margin: 0 0 0.75rem;
      font-weight: 700;
    }
    .legend-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 0.5rem 1rem;
      font-size: 0.8rem;
      color: var(--muted);
    }
    .legend-grid div { display: flex; align-items: baseline; gap: 0.5rem; }
    .legend-grid abbr {
      font-weight: 700;
      color: var(--text);
      min-width: 3.2rem;
    }
    footer {
      margin-top: 2rem;
      font-size: 0.625rem;
      font-weight: 300;
      color: var(--electric-blue);
      letter-spacing: 0.02em;
    }
    .brand-wordmark {
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }
    @media print {
      body::before,
      body::after {
        content: none;
      }
      body {
        background: var(--elevate-navy);
        color: var(--text);
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
      .wrap { max-width: none; padding: 1rem; }
      .swimlane { break-inside: avoid; }
    }
  </style>
</head>

  <script>
    const DATA = JSON.parse(document.getElementById("roadmap-data").textContent);
    document.getElementById("doc-title").textContent = DATA.title;
    document.getElementById("doc-sub").textContent = DATA.subtitle;
    document.title = DATA.title;

    const tl = document.getElementById("timeline");
    DATA.phases.forEach((p, i) => {
      const div = document.createElement("div");
      div.className = "phase-pill p" + (i + 1);
      div.innerHTML = '<div class="phase-dot"></div><strong>' + p.label + '</strong><span class="hint">' + p.hint + '</span>';
      tl.appendChild(div);
    });

    const legend = document.getElementById("legend");
    DATA.valueLegend.forEach((v) => {
      const row = document.createElement("div");
      row.innerHTML = "<abbr>" + v.abbr + "</abbr><span>" + v.full + "</span>";
      legend.appendChild(row);
    });

    const lanes = document.getElementById("lanes");
    DATA.groups.forEach((gid) => {
      const items = DATA.byGroup[gid] || [];
      const label = DATA.groupLabels[gid] || gid;
      const lane = document.createElement("div");
      lane.className = "swimlane";
      lane.innerHTML =
        '<div class="lane-label"><span class="lane-id">' +
        gid +
        '</span><span class="lane-title">' +
        label +
        "</span></div>";
      const grid = document.createElement("div");
      grid.className = "phase-grid";
      for (let ph = 1; ph <= 3; ph++) {
        const col = document.createElement("div");
        col.className = "phase-col c" + ph;
        items
          .filter((f) => f.phase === ph)
          .forEach((f) => {
            const el = document.createElement("div");
            el.className = "feat";
            let tags = "";
            if (f.areasShort && f.areasShort.length) {
              tags =
                '<div class="tags">' +
                f.areasShort
                  .map((a) => '<span class="tag ' + a + '">' + a + "</span>")
                  .join("") +
                "</div>";
            }
            let deps = "";
            if (f.depends) {
              deps = '<div class="feat-deps">Depends on: ' + f.depends + "</div>";
            }
            el.innerHTML =
              '<div class="feat-id">' +
              f.id +
              '</div><div class="feat-title">' +
              f.title +
              "</div>" +
              tags +
              deps;
            col.appendChild(el);
          });
        grid.appendChild(col);
      }
      lane.appendChild(grid);
      lanes.appendChild(lane);
    });
  </script>
